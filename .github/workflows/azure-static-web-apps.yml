name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master  # Se activará cada vez que subas cambios a la rama master

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"              # 🌟 Ahora busca el index.html en la raíz real
          api_location: ""               
          output_location: "/"           # Sube todo desde la raíz (incluyendo /static y /assets)
          skip_app_build: true           # Evita que Oryx intente compilar Python
          ###### ------------------------------------- ######