name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master  # Se activará cada vez que subas cambios a la rama master

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"          # La raíz del proyecto
          api_location: ""           # Vacío, el backend va por libre en Container Apps
          output_location: "/"       # Sube todo para que index.html encuentre /static y /assets