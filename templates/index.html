<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>When Does the ISS Visit My House?</title>

    <!-- Leaflet -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Your CSS -->
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>

    <!-- HEADER -->
    <header class="hero">
        <h1>🛰 When Does the ISS Visit My House?</h1>
        <p class="subtitle">
            See when the ISS decides to fly over your place.
        </p>

        <!-- HOME BUTTON -->
        <button class="home-button" onclick="goHome()">
            <span class="home-icon">⌂</span>
            <span>Home</span>
        </button>

    </header>

    <!-- MAP CARD -->
    <section class="card">
        <h2>Live ISS Position</h2>

        <div id="map"></div>
    </section>

    <!-- LOCATION CARD -->
    <section class="card">
        <h2>When does the ISS come to your house?</h2>

        <p>
            Click anywhere on the map to select a location,
            or enter coordinates manually.
        </p>

        <div class="input-grid">

            <label>
                Latitude
                <input id="lat" type="number" step="0.0001">
            </label>

            <label>
                Longitude
                <input id="lon" type="number" step="0.0001">
            </label>

        </div>

        <button class="primary-button" onclick="getNextPass()">
            🚀 When's the next fly-by?
        </button>

        <!-- PREDICTION BUTTON -->
        <button class="primary-button" onclick="getClosestPass()">🏠 Will it fly over my roof?</button>

        <!-- GET TRAYECTORY BUTTON -->
        <button class="primary-button" onclick="getTrajectory()">🗺️ Draw the orbit (next 90 point)</button>


        <p id="result"></p>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>Built with Leaflet + Open Notify API</p>
    </footer>

    <!-- JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/static/script.js"></script>

</body>
</html>
